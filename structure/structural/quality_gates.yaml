schema_version: "1.0"
pattern: quality_gates
pattern_number: 8
type: structural
description: >
  Warnings and quality flags — known limitations and edge cases per tool.

tools:
  Read:
    warnings:
      - Lines longer than 2000 characters are truncated
      - Large PDFs require pages parameter — reading without it will fail
      - Default reads up to 2000 lines — use offset/limit for large files
    quality:
      reliability: high
      coverage: text, images, PDFs, notebooks

  Edit:
    warnings:
      - old_string must be unique in the file or edit fails
      - Indentation must match exactly (tabs vs spaces matter)
      - Must Read the file first in the same conversation
    quality:
      reliability: high
      safety: exact-match prevents wrong-location edits

  Bash:
    warnings:
      - Shell state does not persist between calls (only working directory does)
      - Default timeout is 2 minutes — set timeout for long-running commands
      - Interactive commands (-i flag) are not supported
      - Output truncated at 30000 characters
    quality:
      reliability: medium
      safety: commands can have side effects

  Grep:
    warnings:
      - Single-line matching by default — use multiline: true for cross-line patterns
      - Literal braces need escaping in patterns
    quality:
      reliability: high
      engine: ripgrep

  Write:
    warnings:
      - Overwrites the entire file — all content not included in your write is lost
      - Must Read existing files before overwriting them
      - Never proactively create documentation files unless explicitly requested
    quality:
      reliability: high
      safety: destructive to existing content — prefer Edit for modifications

  Glob:
    warnings:
      - Returns paths sorted by modification time, not alphabetically
      - Does not search file contents — use Grep for content matching
    quality:
      reliability: high
      coverage: any file system pattern

  WebFetch:
    warnings:
      - Authenticated or private URLs will fail without clear error
      - HTTP URLs are automatically upgraded to HTTPS
      - Content from very large pages may be summarized or truncated
      - 15-minute cache means repeated fetches may return stale content
    quality:
      reliability: medium
      dependency: external network and target site availability

  WebSearch:
    warnings:
      - Results may not reflect the most recent information
      - Always use the current year in search queries for recent data
      - Must include Sources section with URLs in the response
    quality:
      reliability: medium
      dependency: external search service availability

  NotebookEdit:
    warnings:
      - Cell numbering is 0-indexed — first cell is cell_number 0
      - Must Read the notebook first to understand cell structure
      - cell_type is required when using edit_mode=insert
    quality:
      reliability: high
      coverage: code and markdown cell types
