schema_version: "1.0"
pattern: self_describing
pattern_number: 6
type: structural
description: >
  Self-describing schemas — output schemas for tools that lack them.

tools:
  Read:
    type: object
    properties:
      content:
        type: string
        description: File content with line numbers (cat -n format)

  Edit:
    type: object
    properties:
      success:
        type: boolean
      error:
        type: string
        description: Error message if edit failed

  Write:
    type: object
    properties:
      success:
        type: boolean
      file_path:
        type: string
        description: Path of written file

  Bash:
    type: object
    properties:
      stdout:
        type: string
      stderr:
        type: string
      exit_code:
        type: integer

  Grep:
    type: object
    properties:
      matches:
        type: array
        description: Matching lines, file paths, or counts depending on output_mode

  Glob:
    type: object
    properties:
      files:
        type: array
        items:
          type: string
        description: Matching file paths sorted by modification time

  WebFetch:
    type: object
    properties:
      content:
        type: string
        description: Processed content from the URL, converted from HTML to markdown
      redirect_url:
        type: string
        description: Redirect URL if the request was redirected to a different host

  WebSearch:
    type: object
    properties:
      results:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            url:
              type: string
            snippet:
              type: string
        description: Search results with titles, URLs, and text snippets

  NotebookEdit:
    type: object
    properties:
      success:
        type: boolean
      cell_number:
        type: integer
        description: The 0-indexed cell number that was edited, inserted, or deleted
      edit_mode:
        type: string
        description: The operation performed — replace, insert, or delete
